<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1 class="app-title">Calculator</h1>

      <div class="calculator" aria-label="Calculator">
        <!-- aria-live tells screen readers when the display changes -->
        <output class="display" id="display" aria-live="polite">0</output>

        <div class="keypad" role="group" aria-label="Calculator keypad">
          <button type="button" class="key key--utility" data-action="clear-all">AC</button>
          <button type="button" class="key key--utility" data-action="clear">C</button>
          <button type="button" class="key key--utility" data-action="toggle-sign">+/-</button>
          <button type="button" class="key key--operator" data-action="operator" data-op="/">/</button>

          <button type="button" class="key" data-action="digit" data-digit="7">7</button>
          <button type="button" class="key" data-action="digit" data-digit="8">8</button>
          <button type="button" class="key" data-action="digit" data-digit="9">9</button>
          <button type="button" class="key key--operator" data-action="operator" data-op="-">-</button>

          <button type="button" class="key" data-action="digit" data-digit="4">4</button>
          <button type="button" class="key" data-action="digit" data-digit="5">5</button>
          <button type="button" class="key" data-action="digit" data-digit="6">6</button>
          <button type="button" class="key key--operator" data-action="operator" data-op="+">+</button>

          <button type="button" class="key" data-action="digit" data-digit="1">1</button>
          <button type="button" class="key" data-action="digit" data-digit="2">2</button>
          <button type="button" class="key" data-action="digit" data-digit="3">3</button>
          <button type="button" class="key key--equals" data-action="equals">=</button>

          <button type="button" class="key key--zero" data-action="digit" data-digit="0">0</button>
          <button type="button" class="key" data-action="decimal">.</button>
        </div>
      </div>
    </main>

    <!-- Logic first (no DOM), then UI wiring -->
    <script src="calculator-logic.js"></script>
    <script src="calculator.js"></script>
  </body>
</html>
